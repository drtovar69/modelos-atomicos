<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arma los Modelos Atómicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
            touch-action: none; /* Prevents pull-to-refresh on mobile when playing */
        }

        .scrollable-area {
            touch-action: pan-y; /* Re-enable vertical scroll for specific areas if needed */
        }

        /* Drag and Drop Custom Styles */
        .draggable-piece {
            cursor: grab;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .draggable-piece:active {
            cursor: grabbing;
        }

        .drop-zone {
            position: relative;
            background-image: radial-gradient(circle, #1e293b 2px, transparent 2px);
            background-size: 20px 20px;
        }

        /* When placed in the model */
        .placed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to the drop zone behind */
            animation: snapIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .placed .piece-label {
            display: none; /* Hide labels when assembled to form a clean model */
        }

        /* Color transitions */
        .piece-color {
            color: #22c55e; /* text-green-500 */
            transition: color 0.5s ease, filter 0.5s ease;
        }

        .model-completed .piece-color {
            color: #ef4444; /* text-red-500 */
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6));
        }

        .model-completed {
            animation: pulseSuccess 0.5s ease-in-out;
        }

        @keyframes snapIn {
            0% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulseSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Stop selection */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-10">

    <!-- Header -->
    <header class="w-full max-w-6xl mx-auto p-4 flex justify-between items-center glass-panel sticky top-0 z-10 border-b border-slate-700">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">Modelos Atómicos</h1>
            <p class="text-xs md:text-sm text-slate-400">Arma las piezas correctas en cada zona.</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="timer-display" class="text-2xl md:text-3xl font-mono font-bold text-emerald-400 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 shadow-inner">
                05:00
            </div>
            <button onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg transition-colors" aria-label="Reiniciar Juego">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256"><path d="M197.66,186.34a104,104,0,1,1,16-118.89,8,8,0,0,1-13.88,8,88,88,0,1,0-13.59,100.86,8,8,0,0,1,11.45,10Z"/><path d="M224,104a8,8,0,0,1-8,8H168a8,8,0,0,1,0-16h38.25A103.88,103.88,0,0,0,136,32a8,8,0,0,1,0-16,119.86,119.86,0,0,1,80.75,31.25V56a8,8,0,0,1,16,0Z"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="w-full max-w-6xl mx-auto flex-1 flex flex-col mt-6 px-4 gap-8">
        
        <!-- Drop Zones (The Models) -->
        <section>
            <h2 class="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M208,40H48A16,16,0,0,0,32,56V200a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V56A16,16,0,0,0,208,40Zm0,160H48V56H208V200ZM144,128a16,16,0,1,1-16-16A16,16,0,0,1,144,128Z"/></svg>
                Zonas de Ensamblaje
            </h2>
            <div id="drop-zones-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <!-- Zones rendered by JS -->
            </div>
        </section>

        <!-- Pieces Bank -->
        <section class="mt-auto pt-6 border-t border-slate-800">
            <h2 class="text-lg font-semibold text-slate-300 mb-4">Banco de Piezas (Arrastra al marco correcto)</h2>
            <div id="pieces-bank" class="flex flex-wrap justify-center gap-4 min-h-[160px] p-4 bg-slate-800/50 rounded-2xl border border-slate-700 shadow-inner">
                <!-- Pieces rendered by JS -->
            </div>
        </section>

    </main>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div id="modal-content" class="bg-slate-800 border border-slate-600 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl transform transition-all scale-95 opacity-0">
            <div id="modal-icon" class="flex justify-center mb-4"></div>
            <h2 id="modal-title" class="text-3xl font-bold mb-2"></h2>
            <p id="modal-text" class="text-slate-300 mb-6"></p>
            <button onclick="startGame()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-colors text-lg">
                Jugar de Nuevo
            </button>
        </div>
    </div>

    <script>
        // --- Data Definitions ---
        
        // Models definition (Zone IDs and pieces required)
        const modelsData = [
            { id: 'dalton', name: 'Dalton (1803)', piecesRequired: 1 },
            { id: 'thomson', name: 'Thomson (1904)', piecesRequired: 2 },
            { id: 'rutherford', name: 'Rutherford (1911)', piecesRequired: 2 },
            { id: 'bohr', name: 'Bohr (1913)', piecesRequired: 2 },
            { id: 'quantum', name: 'Schrödinger (1926)', piecesRequired: 2 }
        ];

        // SVGs for the pieces. They use currentColor to inherit the green/red colors via text classes.
        const piecesData = [
            // Dalton
            { id: 'p-dalton', target: 'dalton', label: 'Esfera Sólida', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="35" fill="currentColor"/></svg>' },
            
            // Thomson
            { id: 'p-thomson-base', target: 'thomson', label: 'Masa Positiva', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="40" fill="currentColor" opacity="0.4"/><text x="50" y="60" text-anchor="middle" fill="currentColor" font-size="32" font-weight="bold">+</text></svg>' },
            { id: 'p-thomson-elec', target: 'thomson', label: 'Electrones (Pudín)', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="30" cy="30" r="4" fill="currentColor"/><circle cx="65" cy="25" r="4" fill="currentColor"/><circle cx="80" cy="55" r="4" fill="currentColor"/><circle cx="45" cy="75" r="4" fill="currentColor"/><circle cx="20" cy="60" r="4" fill="currentColor"/></svg>' },
            
            // Rutherford
            { id: 'p-ruth-nuc', target: 'rutherford', label: 'Núcleo Denso (+)', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="6" fill="currentColor"/></svg>' },
            { id: 'p-ruth-orb', target: 'rutherford', label: 'Órbitas Cruzadas', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><ellipse cx="50" cy="50" rx="45" ry="12" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(0 50 50)"/><ellipse cx="50" cy="50" rx="45" ry="12" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(60 50 50)"/><ellipse cx="50" cy="50" rx="45" ry="12" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(120 50 50)"/></svg>' },
            
            // Bohr
            { id: 'p-bohr-nuc', target: 'bohr', label: 'Núcleo (p+ y n°)', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="47" cy="47" r="4" fill="currentColor"/><circle cx="53" cy="53" r="4" fill="currentColor"/><circle cx="47" cy="53" r="4" fill="currentColor"/><circle cx="53" cy="47" r="4" fill="currentColor"/></svg>' },
            { id: 'p-bohr-orb', target: 'bohr', label: 'Niveles de Energía', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="72" cy="50" r="4" fill="currentColor"/><circle cx="28" cy="50" r="4" fill="currentColor"/><circle cx="50" cy="8" r="4" fill="currentColor"/><circle cx="50" cy="92" r="4" fill="currentColor"/></svg>' },
            
            // Quantum (Schrödinger)
            { id: 'p-quant-nuc', target: 'quantum', label: 'Núcleo Central', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="4" fill="currentColor"/></svg>' },
            { id: 'p-quant-cld', target: 'quantum', label: 'Nube de Probabilidad', svg: '<svg viewBox="0 0 100 100" class="w-full h-full"><defs><radialGradient id="cloudGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="currentColor" stop-opacity="1"/><stop offset="20%" stop-color="currentColor" stop-opacity="0.6"/><stop offset="100%" stop-color="currentColor" stop-opacity="0"/></radialGradient></defs><circle cx="50" cy="50" r="45" fill="url(#cloudGrad)"/></svg>' }
        ];

        // --- Game State ---
        let timerInterval;
        let timeLeft = 300; // 5 minutes
        let isPlaying = false;
        let placedPiecesCount = 0;
        const totalPieces = piecesData.length;

        // Custom Drag State
        let isDragging = false;
        let draggedPiece = null;
        let dragClone = null;
        let offsetX = 0, offsetY = 0;

        // --- DOM Elements ---
        const timerDisplay = document.getElementById('timer-display');
        const dropZonesContainer = document.getElementById('drop-zones-container');
        const piecesBank = document.getElementById('pieces-bank');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const modalIcon = document.getElementById('modal-icon');

        // --- Initialization ---
        function startGame() {
            clearInterval(timerInterval);
            timeLeft = 300;
            isPlaying = true;
            placedPiecesCount = 0;
            updateTimerDisplay();
            hideModal();
            
            renderDropZones();
            renderPieces();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function renderDropZones() {
            dropZonesContainer.innerHTML = '';
            modelsData.forEach(model => {
                const zone = document.createElement('div');
                zone.className = 'flex flex-col items-center bg-slate-800 rounded-xl p-3 border-2 border-slate-700 shadow-md';
                zone.innerHTML = `
                    <h3 class="text-sm font-bold text-slate-300 mb-2 whitespace-nowrap">${model.name}</h3>
                    <div class="drop-zone w-32 h-32 md:w-40 md:h-40 rounded-full border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden" 
                         data-zone-id="${model.id}" 
                         data-required="${model.piecesRequired}">
                         <!-- Pieces will be dropped here -->
                    </div>
                `;
                dropZonesContainer.appendChild(zone);
            });
        }

        function renderPieces() {
            piecesBank.innerHTML = '';
            // Shuffle pieces
            const shuffled = [...piecesData].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(piece => {
                const el = document.createElement('div');
                // Initial color: piece-color text-green-500
                el.className = 'draggable-piece piece-color text-green-500 flex flex-col items-center w-24 h-28 md:w-28 md:h-32 bg-slate-700/50 border border-slate-600 rounded-lg p-2 hover:bg-slate-700 transition-colors';
                el.dataset.target = piece.target;
                el.dataset.pieceId = piece.id;
                
                el.innerHTML = `
                    <div class="svg-container w-16 h-16 md:w-20 md:h-20 flex-shrink-0 pointer-events-none">
                        ${piece.svg}
                    </div>
                    <span class="piece-label text-[10px] md:text-xs text-slate-300 text-center mt-2 leading-tight pointer-events-none">${piece.label}</span>
                `;
                piecesBank.appendChild(el);
            });
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 30 && timeLeft > 0) {
                timerDisplay.classList.remove('text-emerald-400');
                timerDisplay.classList.add('text-red-500', 'animate-pulse');
            } else if (timeLeft > 30) {
                timerDisplay.classList.remove('text-red-500', 'animate-pulse');
                timerDisplay.classList.add('text-emerald-400');
            }
        }

        // --- Custom Drag & Drop Engine (Touch & Mouse Support) ---
        
        document.addEventListener('pointerdown', (e) => {
            if (!isPlaying) return;
            const piece = e.target.closest('.draggable-piece');
            if (!piece || piece.classList.contains('placed')) return;

            isDragging = true;
            draggedPiece = piece;
            
            const rect = piece.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            // Create a fixed clone for visual dragging
            dragClone = piece.cloneNode(true);
            dragClone.classList.add('fixed', 'z-[100]', 'shadow-2xl');
            dragClone.classList.remove('hover:bg-slate-700');
            dragClone.style.left = `${rect.left}px`;
            dragClone.style.top = `${rect.top}px`;
            dragClone.style.width = `${rect.width}px`;
            dragClone.style.height = `${rect.height}px`;
            dragClone.style.pointerEvents = 'none'; // Crucial for elementFromPoint
            
            document.body.appendChild(dragClone);
            
            // Hide original
            draggedPiece.style.opacity = '0';
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging || !dragClone) return;
            // Prevent default touch actions (like scrolling) while dragging
            e.preventDefault();
            dragClone.style.left = `${e.clientX - offsetX}px`;
            dragClone.style.top = `${e.clientY - offsetY}px`;
        }, { passive: false });

        document.addEventListener('pointerup', (e) => {
            if (!isDragging || !draggedPiece) return;
            isDragging = false;

            // Find what is under the pointer
            const targetEl = document.elementFromPoint(e.clientX, e.clientY);
            const dropZone = targetEl ? targetEl.closest('.drop-zone') : null;

            const expectedTarget = draggedPiece.dataset.target;

            if (dropZone && dropZone.dataset.zoneId === expectedTarget) {
                // Correct Match!
                handleCorrectDrop(dropZone, draggedPiece);
            } else {
                // Incorrect - Animate clone back
                animateCloneBack();
            }
        });

        function handleCorrectDrop(zone, piece) {
            // Remove background, borders from the piece container to make it just the SVG
            piece.className = 'draggable-piece placed piece-color text-green-500'; // Keep green initially
            
            // Append to zone
            zone.appendChild(piece);
            piece.style.opacity = '1';
            
            if (dragClone) {
                dragClone.remove();
                dragClone = null;
            }

            placedPiecesCount++;
            checkModelCompletion(zone);
            
            if (placedPiecesCount === totalPieces) {
                setTimeout(() => endGame(true), 600); // Slight delay to let animations finish
            }
        }

        function animateCloneBack() {
            if (!dragClone || !draggedPiece) return;
            
            const rect = draggedPiece.getBoundingClientRect();
            dragClone.style.transition = 'all 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
            dragClone.style.left = `${rect.left}px`;
            dragClone.style.top = `${rect.top}px`;
            
            setTimeout(() => {
                if (draggedPiece) draggedPiece.style.opacity = '1';
                if (dragClone) dragClone.remove();
                dragClone = null;
                draggedPiece = null;
            }, 300);
        }

        function checkModelCompletion(zone) {
            const piecesRequired = parseInt(zone.dataset.required);
            const piecesPlaced = zone.querySelectorAll('.placed').length;

            if (piecesPlaced === piecesRequired) {
                // Model is fully assembled!
                zone.classList.add('model-completed');
                zone.classList.remove('border-dashed', 'border-slate-600');
                zone.classList.add('border-solid', 'border-red-500/50', 'bg-slate-900'); // Emphasize completion background
                
                // Change all pieces inside to red
                const pieces = zone.querySelectorAll('.placed');
                pieces.forEach(p => {
                    p.classList.remove('text-green-500');
                    p.classList.add('text-red-500');
                });
            }
        }

        // --- End Game Logic ---
        function endGame(win) {
            isPlaying = false;
            clearInterval(timerInterval);

            if (win) {
                modalTitle.textContent = "¡Misión Cumplida!";
                modalTitle.className = "text-3xl font-bold mb-2 text-emerald-400";
                modalText.textContent = "Has armado correctamente todos los modelos atómicos históricos.";
                modalIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#34d399" viewBox="0 0 256 256"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>`;
            } else {
                modalTitle.textContent = "¡Tiempo Agotado!";
                modalTitle.className = "text-3xl font-bold mb-2 text-red-500";
                modalText.textContent = "El tiempo llegó a cero antes de armar todos los modelos.";
                modalIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#ef4444" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-88V80a8,8,0,0,0-16,0v52.69l-34.34,34.34a8,8,0,0,0,11.31,11.31l40-40A8,8,0,0,0,144,128Z"/></svg>`;
            }

            modalOverlay.classList.remove('hidden');
            // Small delay to trigger CSS transition
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function hideModal() {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modalOverlay.classList.add('hidden');
            }, 300);
        }

        // Init on load
        startGame();

    </script>
</body>
</html>
